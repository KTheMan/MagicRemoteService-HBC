name: Build webOS IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install webOS CLI (ares-package)
        run: npm install -g @webosose/ares-cli

      - name: Package webOS IPK
        run: |
          ares-package \
            MagicRemoteService/Resources/TV/MagicRemoteService \
            MagicRemoteService/Resources/TV/Service \
            -o .
          # ares-package names the file after appinfo.json's own version
          # field, which upstream doesn't keep in sync with real releases
          # (it's still 1.0.0) - drop that segment rather than ship a
          # filename claiming a version this clearly isn't.
          mv com.cathwyler.magicremoteservice_*.ipk com.cathwyler.magicremoteservice_all.ipk
          ls -la *.ipk

      - name: Generate webosbrew manifest
        run: |
          IPK=$(ls com.cathwyler.magicremoteservice_*.ipk)
          TAG="${GITHUB_REF#refs/tags/}"
          # Track the release tag here, not appinfo.json's own version field:
          # upstream doesn't keep that in sync with actual releases (it's
          # still 1.0.0), and this manifest's version is just repo-listing
          # metadata - it isn't what the packaged app or opkg validate.
          VERSION="${TAG#v}"
          SHA256=$(sha256sum "$IPK" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$IPK")

          jq -n \
            --arg id "com.cathwyler.magicremoteservice" \
            --arg title "MagicRemoteService" \
            --arg version "$VERSION" \
            --arg type "web" \
            --arg appDescription "Use your LG Magic Remote as a Windows mouse and control your PC from your LG webOS TV" \
            --arg iconUri "https://raw.githubusercontent.com/KTheMan/MagicRemoteService-HBC/$TAG/MagicRemoteService/Resources/TV/MagicRemoteService/largeIcon.png" \
            --arg sourceUrl "https://github.com/Cathwyler/MagicRemoteService" \
            --arg ipkUrl "https://github.com/KTheMan/MagicRemoteService-HBC/releases/download/$TAG/$IPK" \
            --arg sha256 "$SHA256" \
            --argjson ipkSize "$SIZE" \
            '{id: $id, title: $title, version: $version, type: $type, appDescription: $appDescription, iconUri: $iconUri, sourceUrl: $sourceUrl, rootRequired: false, ipkUrl: $ipkUrl, ipkHash: {sha256: $sha256}, ipkSize: $ipkSize}' \
            > org.webosbrew.manifest.json
          cat org.webosbrew.manifest.json

      - name: Upload ipk + manifest
        uses: actions/upload-artifact@v4
        with:
          name: webos-ipk
          path: |
            com.cathwyler.magicremoteservice_*.ipk
            org.webosbrew.manifest.json
          retention-days: 7

  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore MagicRemoteService.sln

      - name: Build PC app (Release)
        run: msbuild MagicRemoteService.sln /p:Configuration=Release /p:Platform="Any CPU" /clp:Summary /nologo

      - name: Assemble installer payload
        run: |
          $dest = "installer\payload"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "MagicRemoteService\bin\Release\MagicRemoteService.exe" $dest
          Copy-Item "MagicRemoteService\bin\Release\MagicRemoteService.exe.config" $dest
          Copy-Item "MagicRemoteService\bin\Release\*.dll" $dest
          Copy-Item "MagicRemoteService\bin\Release\es" "$dest\es" -Recurse
          Copy-Item "MagicRemoteService\bin\Release\fr" "$dest\fr" -Recurse
          Get-ChildItem $dest -Recurse

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" "/DVERSION=$version" "installer\MagicRemoteService.nsi"
          Get-ChildItem installer\*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: pc-installer
          path: installer\MagicRemoteService-Setup-*.exe
          retention-days: 7

  release:
    needs: [build-ipk, build-installer]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download ipk + manifest
        uses: actions/download-artifact@v4
        with:
          name: webos-ipk

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: pc-installer

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            com.cathwyler.magicremoteservice_*.ipk
            org.webosbrew.manifest.json
            MagicRemoteService-Setup-*.exe
          generate_release_notes: true

      - name: Notify webos-apps-repo of new release
        # Best-effort: a missing/expired REPO_DISPATCH_TOKEN or an outage on
        # the other repo shouldn't red-X a release that already succeeded.
        continue-on-error: true
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/KTheMan/webos-apps-repo/dispatches \
            -d '{"event_type":"update-bigbookshelf"}'
