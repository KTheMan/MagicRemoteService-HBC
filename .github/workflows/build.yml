name: Build webOS IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install webOS CLI (ares-package)
        run: npm install -g @webosose/ares-cli

      - name: Package webOS IPK
        run: |
          ares-package \
            MagicRemoteService/Resources/TV/MagicRemoteService \
            MagicRemoteService/Resources/TV/Service \
            -o .
          ls -la *.ipk

      - name: Generate webosbrew manifest
        run: |
          IPK=$(ls com.cathwyler.magicremoteservice_*.ipk)
          TAG="${GITHUB_REF#refs/tags/}"
          # Track the release tag here, not appinfo.json's own version field:
          # upstream doesn't keep that in sync with actual releases (it's
          # still 1.0.0), and this manifest's version is just repo-listing
          # metadata - it isn't what the packaged app or opkg validate.
          VERSION="${TAG#v}"
          SHA256=$(sha256sum "$IPK" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$IPK")

          jq -n \
            --arg id "com.cathwyler.magicremoteservice" \
            --arg title "MagicRemoteService" \
            --arg version "$VERSION" \
            --arg type "web" \
            --arg appDescription "Use your LG Magic Remote as a Windows mouse and control your PC from your LG webOS TV" \
            --arg iconUri "https://raw.githubusercontent.com/KTheMan/MagicRemoteService-HBC/$TAG/MagicRemoteService/Resources/TV/MagicRemoteService/largeIcon.png" \
            --arg sourceUrl "https://github.com/Cathwyler/MagicRemoteService" \
            --arg ipkUrl "https://github.com/KTheMan/MagicRemoteService-HBC/releases/download/$TAG/$IPK" \
            --arg sha256 "$SHA256" \
            --argjson ipkSize "$SIZE" \
            '{id: $id, title: $title, version: $version, type: $type, appDescription: $appDescription, iconUri: $iconUri, sourceUrl: $sourceUrl, rootRequired: false, ipkUrl: $ipkUrl, ipkHash: {sha256: $sha256}, ipkSize: $ipkSize}' \
            > org.webosbrew.manifest.json
          cat org.webosbrew.manifest.json

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            com.cathwyler.magicremoteservice_*.ipk
            org.webosbrew.manifest.json
          generate_release_notes: true
